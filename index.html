<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filters - Ranjan Woolens</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #fff;
      margin: 0;
      padding: 40px;
    }

    .filters {
      width: 300px;
      border: none;
    }

    .filters h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .filter-item {
      border-bottom: 1px solid #e0e0e0;
      padding: 15px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .filter-item span {
      font-size: 15px;
      color: #222;
    }

    .filter-item i {
      font-size: 14px;
      color: #333;
      transition: transform 0.3s ease;
    }

    .filter-item:hover i {
      transform: rotate(180deg);
    }
  </style>
</head>
<body>
  <div class="filters">
    <h2>Filters</h2>
    <div class="filter-item"><span>Product type</span><i>▼</i></div>
    <div class="filter-item"><span>Brand</span><i>▼</i></div>
    <div class="filter-item"><span>Price</span><i>▼</i></div>
    <div class="filter-item"><span>Color</span><i>▼</i></div>
    <div class="filter-item"><span>Size</span><i>▼</i></div>
    <div class="filter-item"><span>Product rating count</span><i>▼</i></div>
  </div>
</body>
</html>
